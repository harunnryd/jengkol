services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jengkol
      POSTGRES_PASSWORD: jengkol
      POSTGRES_DB: jengkol
    ports:
      - "5432:5432"
    volumes:
      - jengkol_postgres_data:/var/lib/postgresql/data

volumes:
  jengkol_postgres_data:
