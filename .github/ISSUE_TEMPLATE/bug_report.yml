name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: app
    attributes:
      label: Where
      options:
        - apps/api
        - apps/web
        - monorepo tooling (turbo/pnpm/husky)
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm --filter api dev`
        2. POST /creators with ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
  - type: input
    id: version
    attributes:
      label: Commit / version
      description: Git SHA or tag you're on, if relevant
