version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      langchain:
        patterns:
          - "@langchain/*"
          - "langchain"
      langfuse:
        patterns:
          - "@langfuse/*"
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
