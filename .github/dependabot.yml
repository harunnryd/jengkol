version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Major version bumps need a deliberate, reviewed migration (e.g. NestJS 10->11,
    # ESLint 8->10 which drops legacy .eslintrc support entirely) — never auto-propose
    # them. Minor/patch only, batched into as few PRs as possible.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Pinned <0.5: 0.5.x is an ESM-only rewrite incompatible with our ESLint 8 legacy
      # config (see apps/web/.eslintrc.cjs). A 0.4->0.5 bump is semver "minor", not
      # "major", so the blanket major-version ignore above doesn't catch it.
      - dependency-name: "eslint-plugin-react-refresh"
        versions: [">=0.5.0"]
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
