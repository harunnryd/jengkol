name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: generate prisma client
        run: pnpm --filter api exec prisma generate

      - run: pnpm build

      - run: pnpm lint

      - name: web unit tests
        run: pnpm --filter web test

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jengkol
          POSTGRES_PASSWORD: jengkol
          POSTGRES_DB: jengkol
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://jengkol:jengkol@localhost:5432/jengkol?schema=public
      JWT_SECRET: ci-test-secret-not-for-real-use-do-not-copy
      JWT_EXPIRES_IN: 7d
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: generate prisma client
        run: pnpm --filter api exec prisma generate

      - name: apply migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: unit + integration tests
        run: pnpm --filter api test

      - name: e2e tests
        run: pnpm --filter api test:e2e
